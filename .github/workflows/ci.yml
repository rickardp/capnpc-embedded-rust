name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  # Build the (architecture-independent) wasm ONCE from the vendored patch and
  # share it with every downstream job. This is the same artifact that the
  # release pipeline bundles into the published crate.
  build-wasm:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: sudo apt-get update && sudo apt-get install -y cmake
      - run: capnpc-embedded/ci/build-wasm.sh
      - uses: actions/upload-artifact@v4
        with:
          name: capnp-wasm
          path: capnpc-embedded/assets/capnp.wasm
          retention-days: 7

  # Verify the crate works across the libc/arch combinations that break native
  # binaries. Same wasm everywhere, downloaded from the build-wasm job.
  test:
    needs: build-wasm
    strategy:
      fail-fast: false
      matrix:
        include:
          - { os: ubuntu-latest,  name: linux-glibc-x64 }
          - { os: macos-latest,   name: macos-arm64 }
          - { os: windows-latest, name: windows-x64 }
    runs-on: ${{ matrix.os }}
    name: test-${{ matrix.name }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          name: capnp-wasm
          path: capnpc-embedded/assets
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo test --workspace --all-targets

  # Alpine/musl — the classic native-binary breakage this crate avoids.
  test-musl:
    needs: build-wasm
    runs-on: ubuntu-latest
    name: test-alpine-musl
    container: rust:alpine
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          name: capnp-wasm
          path: capnpc-embedded/assets
      - run: apk add --no-cache musl-dev
      - run: cargo test --workspace --all-targets
